name: Build & Deploy Docs Portal

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [solution-updated]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portal repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mkdocs-material pyyaml

      - name: Fetch README and assets from all solution repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USER: artumex
        run: |
          set -eo pipefail
          mkdir -p docs/solutions

          # ── 1. Discover repos with GitHub topic 'solution-doc' ───────────────
          curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/user/repos?per_page=100&type=all" \
          | python3 -c "
          import sys, json
          repos = json.load(sys.stdin)
          for r in repos:
              if 'solution-doc' in r.get('topics', []):
                  print(r['name'])
          " > solution_repos.txt

          echo "--- Repos with topic solution-doc ---"
          cat solution_repos.txt
          echo "--------------------------------------"

          # ── 2. For each repo: resolve latest Git tag, checkout, process ──────
          # set +e so individual repo failures don't abort the whole job
          set +e
          while IFS= read -r repo; do
            echo "▶  $repo"

            # Fetch latest tag via GitHub API (sorted by version, most recent first)
            LATEST_TAG=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$GH_USER/$repo/tags" \
              | python3 -c "
          import sys, json
          tags = json.load(sys.stdin)
          if not tags:
              sys.exit(1)
          print(tags[0]['name'])
          " 2>/dev/null)

            if [ -n "$LATEST_TAG" ]; then
              echo "   🏷  latest tag: $LATEST_TAG"
              git clone --depth 1 --branch "$LATEST_TAG" \
                https://x-access-token:$GH_TOKEN@github.com/$GH_USER/$repo.git \
                /tmp/$repo \
                || { echo "   ⏭️  $repo — clone failed for tag $LATEST_TAG, skipping"; continue; }
            else
              echo "   ⚠️  $repo — no Git tags, cloning HEAD (unversioned)"
              git clone --depth 1 \
                https://x-access-token:$GH_TOKEN@github.com/$GH_USER/$repo.git \
                /tmp/$repo \
                || { echo "   ⏭️  $repo — clone failed, skipping"; continue; }
            fi

            # ── 2a. Read portal.yml — used ONLY for MkDocs tags ──────────────
            TAGS=""
            if [ -f "/tmp/$repo/portal.yml" ]; then
              TAGS=$(python3 -c "
          import sys, yaml
          with open('/tmp/$repo/portal.yml') as f:
              cfg = yaml.safe_load(f)
          tags = cfg.get('tags', [])
          if tags:
              print('\n'.join(f'  - {t}' for t in tags))
          ")
              [ -z "$TAGS" ] && echo "   ℹ️  $repo — portal.yml has no tags"
            else
              echo "   ℹ️  $repo — no portal.yml, proceeding without tags"
            fi

            # ── 2b. Inject front matter + copy README.md ─────────────────────
            if [ ! -f "/tmp/$repo/README.md" ]; then
              echo "⚠️  $repo — no README.md found, skipping"
              continue
            fi

            {
              echo "---"
              if [ -n "$TAGS" ]; then
                echo "tags:"
                echo "$TAGS"
              fi
              echo "---"
              echo ""
            } > docs/solutions/${repo}.md

            FIRST_LINE=$(head -1 /tmp/$repo/README.md)
            if [ "$FIRST_LINE" = "---" ]; then
              # Strip any existing front matter from the README before appending
              awk 'BEGIN{fm=0} /^---$/{fm++; next} fm==1{next} fm>=2{print}' \
                /tmp/$repo/README.md >> docs/solutions/${repo}.md
              echo "   ✅ README added (existing front matter stripped)"
            else
              cat /tmp/$repo/README.md >> docs/solutions/${repo}.md
              echo "   ✅ README added (ref: ${LATEST_TAG:-HEAD})"
            fi

            # ── 2c. Copy assets/ folder and rewrite image paths ───────────────
            if [ -d "/tmp/$repo/assets" ]; then
              mkdir -p docs/solutions/assets/${repo}
              cp -r /tmp/$repo/assets/. docs/solutions/assets/${repo}/
              # Rewrite both forms in a single pass to avoid double-substitution:
              #   ./assets/foo.png  →  assets/solution-1/foo.png
              #      assets/foo.png  →  assets/solution-1/foo.png
              sed -i -E "s|\]\(\./assets/|\](assets/${repo}/|g; s|\]\(assets/([^)]*)|\](assets/${repo}/\1|g" \
                docs/solutions/${repo}.md
              echo "   📎 assets/ copied → docs/solutions/assets/${repo}/"
            fi

          done < solution_repos.txt

          # ── 3. Ensure docs/solutions/ has at least one .md (mkdocs guard) ───
          if [ -z "$(ls docs/solutions/*.md 2>/dev/null)" ]; then
            echo "⚠️  No solutions fetched — creating empty placeholder"
            printf '# No solutions available\n\nNo solution repositories were found at build time.\n' \
              > docs/solutions/_empty.md
          fi

      - name: Generate navigation
        run: python scripts/gen_nav.py

      - name: Build MkDocs
        run: mkdocs build

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  # ← SEPARATE JOB — this is mandatory
  deploy:
    needs: build           # ← waits for build job to finish
    runs-on: ubuntu-latest
    environment:
      name: github-pages   # ← required
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
